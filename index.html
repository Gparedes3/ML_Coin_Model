<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="ML Model Coins" />
    <meta name="theme-color" content="#0A0A0A" />
    <link rel="manifest" href="manifest.json" />
    <title>ML Model Coins</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-size: 1.2rem;
            color: #C9A84C;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-align: center;
        }

        #video-wrapper {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            background: #222;
            border: 2px solid #C9A84C;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        #live-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #capture-canvas {
            display: none;
        }

        #start-btn {
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            background: #C9A84C;
            color: #111;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #start-btn:disabled {
            background: #555;
            color: #999;
        }

        #status {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #aaa;
            text-align: center;
            min-height: 20px;
        }

        #results {
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-row {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px 16px;
        }

        .result-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 1rem;
        }

        .result-label {
            color: #eee;
        }

        .result-pct {
            color: #C9A84C;
            font-weight: bold;
        }

        .bar-bg {
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: #C9A84C;
            width: 0%;
            transition: width 0.2s ease;
            border-radius: 3px;
        }

        .winner-row {
            border-color: #C9A84C;
            background: #1f1a0d;
        }
    </style>
</head>

<body>

    <h1>ML MODEL COINS</h1>

    <div id="video-wrapper">
        <video id="live-video" playsinline muted autoplay></video>
    </div>
    <canvas id="capture-canvas" width="224" height="224"></canvas>

    <button id="start-btn" onclick="startApp()">ACTIVAR CÁMARA Y MODELO</button>
    <div id="status"></div>
    <div id="results"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => { });
        }

        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/opZ_BSv3J/";

        let model, rafId;
        const video = document.getElementById('live-video');
        const canvas = document.getElementById('capture-canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const results = document.getElementById('results');
        const btn = document.getElementById('start-btn');

        async function startApp() {
            btn.disabled = true;
            status.textContent = "Solicitando permiso de cámara...";

            // 1. Pedir cámara — primero trasera, si falla cualquiera
            try {
                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: "environment" } },
                        audio: false
                    });
                } catch (e) {
                    // Si no hay cámara trasera exacta, usar la que haya
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: true,
                        audio: false
                    });
                }
                video.srcObject = stream;
                await video.play();
                status.textContent = "Cámara activa. Cargando modelo IA...";
            } catch (err) {
                status.textContent = "❌ Error cámara: " + err.message;
                btn.disabled = false;
                return;
            }

            // 2. Cargar modelo Teachable Machine
            try {
                model = await tmImage.load(
                    MODEL_URL + "model.json",
                    MODEL_URL + "metadata.json"
                );
                status.textContent = "✅ Modelo listo. Apunta la moneda.";
                buildResultRows(model.getTotalClasses());
                predict();
            } catch (err) {
                status.textContent = "❌ Error modelo: " + err.message;
                btn.disabled = false;
            }
        }

        function buildResultRows(count) {
            results.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = 'result-row';
                div.id = 'row-' + i;
                div.innerHTML = `
          <div class="result-top">
            <span class="result-label" id="lbl-${i}">—</span>
            <span class="result-pct"  id="pct-${i}">0%</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" id="bar-${i}"></div>
          </div>`;
                results.appendChild(div);
            }
        }

        async function predict() {
            if (!model || video.readyState < 2) {
                rafId = requestAnimationFrame(predict);
                return;
            }

            ctx.drawImage(video, 0, 0, 224, 224);

            const preds = await model.predict(canvas);

            let maxP = 0, maxI = 0;
            preds.forEach((p, i) => { if (p.probability > maxP) { maxP = p.probability; maxI = i; } });

            preds.forEach((p, i) => {
                const pct = Math.round(p.probability * 100);
                document.getElementById('lbl-' + i).textContent = p.className;
                document.getElementById('pct-' + i).textContent = pct + '%';
                document.getElementById('bar-' + i).style.width = pct + '%';

                const row = document.getElementById('row-' + i);
                if (i === maxI && pct > 60) {
                    row.classList.add('winner-row');
                } else {
                    row.classList.remove('winner-row');
                }
            });

            rafId = requestAnimationFrame(predict);
        }
    </script>
</body>

</html>
